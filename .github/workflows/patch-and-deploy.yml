name: Automated Morphe Builder

on:
  workflow_dispatch:
  schedule:
    # Run every 2 hours (12 times a day)
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Make scripts executable
        run: |
          chmod +x src/build/utils.sh src/build/morphe.sh

      - name: Run Morphe builder (YouTube, Reddit, YT Music)
        run: |
          bash src/build/morphe.sh all

      - name: Determine Morphe patches tag
        id: morphe_tag
        run: |
          TAG=$(curl -s https://api.github.com/repos/MorpheApp/morphe-patches/releases/latest | jq -r '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with patched APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.morphe_tag.outputs.tag }}
          name: ${{ steps.morphe_tag.outputs.tag }}
          files: release/*.apk
          fail_on_unmatched_files: false

